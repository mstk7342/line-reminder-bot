# ============================================================
# LINE Bot 設定
# LINE Developers Console から取得した値を設定する
# https://developers.line.biz/console/
# ============================================================

# Channel Secret (Webhook 署名検証に使用)
line.bot.channel-secret=YOUR_CHANNEL_SECRET_HERE

# Channel Access Token (API 呼び出しに使用)
line.bot.channel-token=YOUR_CHANNEL_ACCESS_TOKEN_HERE

# Webhook の受信エンドポイント (デフォルト: /callback)
line.bot.handler.path=/callback

# ============================================================
# データベース設定 (H2 インメモリ - 開発用)
# 本番環境では MySQL/PostgreSQL に切り替えること
# ============================================================
spring.datasource.url=jdbc:h2:mem:reminderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 コンソール (開発時の確認用: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# MySQL への切り替え例 (本番環境)
# ============================================================
# spring.datasource.url=jdbc:mysql://localhost:3306/reminderdb?serverTimezone=Asia/Tokyo
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# spring.jpa.hibernate.ddl-auto=update

# ============================================================
# アプリケーション設定
# ============================================================
server.port=8080

# ログレベル
logging.level.com.example.linereminder=INFO
logging.level.com.linecorp.bot=WARN
